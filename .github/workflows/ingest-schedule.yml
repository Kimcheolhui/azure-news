name: Scheduled Ingest

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC daily
    - cron: '0 18 * * *'   # 18:00 UTC daily
  workflow_dispatch:         # Manual trigger for testing

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ./backend

      - name: Seed sources
        run: python -m ingest sources seed

      - name: Run all scrapers
        run: python -m ingest scrape run --all

      - name: Enrich new updates
        run: python -m analysis enrich pending

      - name: Show run summary
        run: python -m ingest runs --last 4
