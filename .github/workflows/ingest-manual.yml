name: Manual Ingest

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to scrape (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - azure-updates-rss
          - azure-blog
          - fabric-blog
          - github-blog
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: false
        type: boolean

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Seed sources
        run: python -m ingest sources seed

      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ inputs.source }}" = "all" ]; then
            ARGS="--all"
          else
            ARGS="--source ${{ inputs.source }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m ingest scrape run $ARGS

      - name: Show run summary
        if: ${{ inputs.dry_run == false }}
        run: python -m ingest runs --last 4
